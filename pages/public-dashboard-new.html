<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidReach - Find Ambulances</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            height: calc(100vh - 80px);
            padding: 2rem;
            background: var(--bg-light);
        }

        #map {
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 1;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .alert-banner {
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            animation: slideInDown 0.3s ease-out;
        }

        .alert-banner.nearby {
            background: rgba(255, 165, 0, 0.1);
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
        }

        .alert-banner.safe {
            background: rgba(76, 175, 80, 0.1);
            color: var(--secondary-color);
            border-left: 4px solid var(--secondary-color);
        }

        .ambulance-list {
            display: grid;
            gap: 1rem;
        }

        .ambulance-card {
            background: white;
            padding: 1.25rem;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ambulance-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .ambulance-card.selected {
            background: rgba(220, 20, 60, 0.05);
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .ambulance-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }

        .ambulance-title {
            font-weight: 600;
            color: var(--text-primary);
        }

        .ambulance-status {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .ambulance-status.available {
            background: rgba(76, 175, 80, 0.1);
            color: var(--secondary-color);
        }

        .ambulance-status.enroute {
            background: rgba(255, 165, 0, 0.1);
            color: var(--accent-color);
        }

        .ambulance-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: var(--gray-50);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .stat-label {
            color: var(--text-light);
        }

        .stat-value {
            font-weight: 600;
            color: var(--primary-color);
            font-family: var(--font-mono);
        }

        .request-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .request-btn:hover {
            background: var(--primary-dark);
            box-shadow: var(--shadow-md);
        }

        .request-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .location-info {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }

        .location-header {
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .location-coords {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .coord-item {
            background: var(--gray-50);
            padding: 0.75rem;
            border-radius: 6px;
            text-align: center;
        }

        .coord-label {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .coord-value {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
        }

        .button-group button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-report {
            background: rgba(220, 20, 60, 0.1);
            color: var(--primary-color);
        }

        .btn-report:hover {
            background: rgba(220, 20, 60, 0.2);
        }

        .btn-hospital {
            background: rgba(52, 152, 219, 0.1);
            color: #3498DB;
        }

        .btn-hospital:hover {
            background: rgba(52, 152, 219, 0.2);
        }

        @media (max-width: 1024px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            #map {
                height: 400px;
                order: -1;
            }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                height: auto;
                padding: 1rem;
            }

            .ambulance-stats {
                grid-template-columns: 1fr;
            }
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(220, 20, 60, 0.3);
            border-top: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container flex-between">
            <div class="navbar-brand">
                <span>🚗</span>
                <span>RapidReach - Find Ambulance</span>
            </div>
            <div class="navbar-user">
                <span id="userPhone" style="color: var(--text-secondary); font-weight: 500;"></span>
                <button class="btn btn-secondary btn-small" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Dashboard -->
    <div class="dashboard-container">
        <!-- Map Section -->
        <div id="map"></div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Alert Banner -->
            <div id="alertBanner" class="alert-banner safe">
                <span id="alertIcon">✅</span>
                <div>
                    <strong>No Ambulances Nearby</strong>
                    <div id="alertText" style="font-size: 0.9rem;">Enable location to find nearby ambulances</div>
                </div>
            </div>

            <!-- Your Location -->
            <div class="location-info">
                <div class="location-header">📍 Your Location</div>
                <div class="location-coords">
                    <div class="coord-item">
                        <div class="coord-label">Latitude</div>
                        <div class="coord-value" id="userLat">--</div>
                    </div>
                    <div class="coord-item">
                        <div class="coord-label">Longitude</div>
                        <div class="coord-value" id="userLng">--</div>
                    </div>
                </div>
                <button class="btn btn-primary w-full" onclick="getCurrentLocation()">
                    📍 Get My Location
                </button>
            </div>

            <!-- Nearby Ambulances -->
            <div class="card">
                <h3 style="margin-bottom: 1rem;">🚑 Nearby Ambulances</h3>
                <div class="ambulance-list" id="ambulanceList">
                    <div style="text-align: center; padding: 2rem; color: var(--text-light);">
                        <div class="spinner" style="width: 20px; height: 20px; margin: 0 auto 0.5rem;"></div>
                        <p>Searching for nearby ambulances...</p>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="button-group">
                <button class="btn-hospital" onclick="findHospitals()">
                    🏥 Find Hospitals
                </button>
                <button class="btn-report" onclick="reportEmergency()">
                    🚨 Emergency
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Configuration & Modules -->
    <script src="../config/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/gps-tracker.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/route-protection.js"></script>

    <script>
        let map;
        let userLocation;
        let userMarker;
        let ambulanceMarkers = {};
        let selectedAmbulance = null;

        async function initDashboard() {
            // Check authentication
            if (!await window.routeProtection.checkAuthentication()) {
                return;
            }

            // Get user info
            const user = await window.routeProtection.getUserInfo();
            if (!user || user.role !== 'publicUser') {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userPhone').textContent = user.phoneNumber;

            // Initialize map
            initMap();

            // Get user location
            await getCurrentLocation();

            // Subscribe to ambulance updates
            subscribeToAmbulances();
        }

        function initMap() {
            map = L.map('map').setView([13.0827, 80.2707], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(map);
        }

        async function getCurrentLocation() {
            try {
                const location = await window.gpsTracker.getCurrentLocation();
                userLocation = location;

                document.getElementById('userLat').textContent = location.latitude.toFixed(6);
                document.getElementById('userLng').textContent = location.longitude.toFixed(6);

                if (userMarker) {
                    userMarker.setLatLng([location.latitude, location.longitude]);
                } else {
                    userMarker = L.marker([location.latitude, location.longitude], {
                        icon: L.icon({
                            iconUrl: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Ctext y="50" font-size="60" font-weight="bold"%3E🚗%3C/text%3E%3C/svg%3E',
                            iconSize: [35, 35]
                        })
                    }).addTo(map);
                }

                map.setView([location.latitude, location.longitude], 15);

                window.notificationSystem.sendNotification({
                    type: 'success',
                    title: 'Location Found',
                    message: `Latitude: ${location.latitude.toFixed(4)}, Longitude: ${location.longitude.toFixed(4)}`
                });
            } catch (error) {
                window.notificationSystem.sendNotification({
                    type: 'error',
                    title: 'Location Error',
                    message: error.message
                });
            }
        }

        function subscribeToAmbulances() {
            const realtimeDb = window.firebaseConfig.realtimeDb;
            
            realtimeDb.ref('activeLocations').on('value', (snapshot) => {
                const ambulances = [];
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (data && userLocation) {
                        const distance = window.gpsTracker.constructor.calculateDistance(
                            userLocation.latitude, userLocation.longitude,
                            data.latitude, data.longitude
                        );
                        
                        if (distance < 5000) { // Within 5km
                            ambulances.push({
                                id: childSnapshot.key,
                                ...data,
                                distance: distance
                            });

                            updateAmbulanceMarker(data, childSnapshot.key);
                        }
                    }
                });

                updateAmbulanceList(ambulances.sort((a, b) => a.distance - b.distance));
            });
        }

        function updateAmbulanceMarker(ambulance, id) {
            if (ambulanceMarkers[id]) {
                ambulanceMarkers[id].setLatLng([ambulance.latitude, ambulance.longitude]);
            } else {
                ambulanceMarkers[id] = L.marker([ambulance.latitude, ambulance.longitude], {
                    icon: L.icon({
                        iconUrl: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Ctext y="50" font-size="60" font-weight="bold"%3E🚑%3C/text%3E%3C/svg%3E',
                        iconSize: [40, 40]
                    })
                }).bindPopup(`<strong>Ambulance</strong><br/>Distance: ${(ambulance.distance / 1000).toFixed(1)} km<br/>Speed: ${ambulance.speed} m/s`).addTo(map);
            }
        }

        function updateAmbulanceList(ambulances) {
            const listEl = document.getElementById('ambulanceList');
            const alertBanner = document.getElementById('alertBanner');

            if (ambulances.length === 0) {
                listEl.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--text-light);">
                        <p>🔍 No ambulances nearby</p>
                        <p style="font-size: 0.9rem;">Check back soon or call emergency services</p>
                    </div>
                `;
                alertBanner.className = 'alert-banner safe';
                alertBanner.innerHTML = `
                    <span>✅</span>
                    <div>
                        <strong>No Ambulances Nearby</strong>
                        <div style="font-size: 0.9rem;">Call emergency services for urgent help</div>
                    </div>
                `;
                return;
            }

            alertBanner.className = 'alert-banner nearby';
            alertBanner.innerHTML = `
                <span>⚠️</span>
                <div>
                    <strong>${ambulances.length} Ambulance${ambulances.length !== 1 ? 's' : ''} Found</strong>
                    <div style="font-size: 0.9rem;">Closest: ${(ambulances[0].distance / 1000).toFixed(1)} km away</div>
                </div>
            `;

            listEl.innerHTML = ambulances.map(amb => `
                <div class="ambulance-card ${selectedAmbulance === amb.id ? 'selected' : ''}" onclick="selectAmbulance('${amb.id}', ${amb.latitude}, ${amb.longitude})">
                    <div class="ambulance-header">
                        <span class="ambulance-title">🚑 Ambulance ${amb.id.substr(0, 8)}</span>
                        <span class="ambulance-status available">Available</span>
                    </div>
                    <div class="ambulance-stats">
                        <div class="stat">
                            <span class="stat-label">Distance</span>
                            <span class="stat-value">${(amb.distance / 1000).toFixed(1)} km</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">ETA</span>
                            <span class="stat-value">${formatETA(amb.distance)}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Speed</span>
                            <span class="stat-value">${(amb.speed || 0).toFixed(1)} m/s</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Accuracy</span>
                            <span class="stat-value">${(amb.accuracy || 0).toFixed(0)} m</span>
                        </div>
                    </div>
                    <button class="request-btn" onclick="requestAmbulance('${amb.id}', event)">
                        📞 Request This Ambulance
                    </button>
                </div>
            `).join('');
        }

        function selectAmbulance(id, lat, lng) {
            selectedAmbulance = id;
            map.setView([lat, lng], 16);
            
            // Reload list to show selection
            subscribeToAmbulances();
        }

        function formatETA(distance) {
            const avgSpeed = 15; // m/s (54 km/h)
            const seconds = Math.round(distance / avgSpeed);
            const mins = Math.floor(seconds / 60);
            return `${mins} min`;
        }

        function requestAmbulance(ambulanceId, event) {
            event.stopPropagation();
            window.notificationSystem.sendNotification({
                type: 'success',
                title: 'Ambulance Requested',
                message: 'Ambulance driver has been notified and is on the way',
                requireInteraction: true
            });

            window.notificationSystem.playAlertSound('success');
        }

        function findHospitals() {
            window.location.href = 'hospital-list.html';
        }

        function reportEmergency() {
            if (confirm('Report emergency in your area?')) {
                window.notificationSystem.sendEmergencyAlert({
                    latitude: userLocation?.latitude || 13.0827,
                    longitude: userLocation?.longitude || 80.2707,
                    type: 'emergency',
                    description: 'Emergency reported by user',
                    severity: 'critical'
                });

                window.notificationSystem.sendNotification({
                    type: 'emergency',
                    title: '🚨 Emergency Alert Sent',
                    message: 'Emergency responders have been notified',
                    requireInteraction: true
                });
            }
        }

        async function logout() {
            if (confirm('Are you sure you want to logout?')) {
                await window.routeProtection.logout();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
