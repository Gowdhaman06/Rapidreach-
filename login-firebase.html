<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RapidReach - Ambulance Priority System Firebase Phone Authentication">
    <title>RapidReach - Ambulance Priority System Login</title>
    <style>
        /* ===========================
           GLOBAL STYLES & VARIABLES
           =========================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #DC143C; /* Crimson red - Ambulance theme */
            --primary-dark: #B91C3A;
            --primary-light: #FF6B6B;
            --white: #FFFFFF;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --border-gray: #ECF0F1;
            --success-green: #27AE60;
            --error-red: #E74C3C;
            --background-light: #F8F9FA;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.2);
            --transition: all 0.3s ease;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-dark);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ===========================
           ANIMATION KEYFRAMES
           =========================== */

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideInRight {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        /* ===========================
           MAIN CONTAINER
           =========================== */

        .login-container {
            width: 100%;
            max-width: 450px;
            animation: slideInUp 0.6s ease-out;
        }

        /* ===========================
           HEADER & BRANDING
           =========================== */

        .login-header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideInDown 0.5s ease-out;
        }

        .logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: var(--white);
            font-weight: bold;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        .logo-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .login-header h1 {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }

        /* ===========================
           FORM CARD
           =========================== */

        .login-card {
            background: var(--white);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            animation: slideInUp 0.6s ease-out 0.1s backwards;
        }

        /* ===========================
           FORM GROUPS & LABELS
           =========================== */

        .form-group {
            margin-bottom: 24px;
            animation: fadeIn 0.5s ease-out;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label.required::after {
            content: " *";
            color: var(--error-red);
        }

        /* ===========================
           INPUT FIELDS
           =========================== */

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 18px;
            color: var(--primary-color);
            pointer-events: none;
            transition: var(--transition);
        }

        input[type="tel"],
        input[type="text"],
        select {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid var(--border-gray);
            border-radius: 10px;
            font-size: 16px;
            color: var(--text-dark);
            background: var(--background-light);
            transition: var(--transition);
            font-family: inherit;
        }

        input[type="tel"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(220, 20, 60, 0.1);
        }

        input[type="tel"]:hover,
        input[type="text"]:hover,
        select:hover {
            border-color: var(--primary-light);
        }

        input[type="tel"]:disabled,
        input[type="text"]:disabled,
        select:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Remove spinner from tel input */
        input[type="tel"]::-webkit-outer-spin-button,
        input[type="tel"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Custom dropdown styling */
        select {
            cursor: pointer;
            padding-right: 40px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23DC143C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 44px;
        }

        /* ===========================
           ERROR MESSAGES
           =========================== */

        .error-message {
            font-size: 13px;
            color: var(--error-red);
            margin-top: 6px;
            display: none;
            animation: slideInDown 0.3s ease-out;
            font-weight: 500;
        }

        .error-message.show {
            display: block;
        }

        /* ===========================
           BUTTONS
           =========================== */

        .form-group.button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 28px;
            margin-bottom: 0;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: var(--white);
            grid-column: 1 / -1;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-color));
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-verify {
            background: linear-gradient(135deg, var(--success-green), #229954);
            color: var(--white);
            box-shadow: var(--shadow-md);
        }

        .btn-verify:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(135deg, #229954, var(--success-green));
        }

        .btn-verify:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--border-gray);
            color: var(--text-dark);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #E0E0E0;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ===========================
           HIDDEN ELEMENTS
           =========================== */

        .form-group.hidden {
            display: none;
            animation: slideInUp 0.4s ease-out;
        }

        .form-group.hidden.show {
            display: block;
        }

        /* ===========================
           STATUS MESSAGES
           =========================== */

        .status-message {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            animation: slideInDown 0.4s ease-out;
            border-left: 4px solid;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success-green);
            border-left-color: var(--success-green);
        }

        .status-message.error {
            background: rgba(231, 76, 60, 0.1);
            color: var(--error-red);
            border-left-color: var(--error-red);
        }

        .status-message.info {
            background: rgba(52, 152, 219, 0.1);
            color: #3498DB;
            border-left-color: #3498DB;
        }

        /* ===========================
           PROGRESS INDICATOR
           =========================== */

        .progress-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            position: relative;
        }

        .progress-step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--border-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-light);
            transition: var(--transition);
            z-index: 2;
        }

        .progress-step.active {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: var(--white);
            box-shadow: var(--shadow-md);
        }

        .progress-step.completed {
            background: var(--success-green);
            color: var(--white);
        }

        .progress-line {
            position: absolute;
            height: 2px;
            background: var(--border-gray);
            top: 19px;
            left: 20px;
            right: 20px;
            z-index: 1;
        }

        .progress-line.filled {
            background: var(--success-green);
            animation: slideInRight 0.5s ease-out;
        }

        /* ===========================
           TIMER FOR OTP RESEND
           =========================== */

        .timer-text {
            font-size: 12px;
            color: var(--text-light);
            text-align: center;
            margin-top: 12px;
        }

        /* ===========================
           reCAPTCHA CONTAINER
           =========================== */

        .recaptcha-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        /* ===========================
           RESPONSIVE DESIGN
           =========================== */

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
                border-radius: 12px;
            }

            .login-header h1 {
                font-size: 26px;
            }

            .login-header {
                margin-bottom: 32px;
            }

            input[type="tel"],
            input[type="text"],
            select {
                padding: 12px 12px 12px 40px;
                font-size: 16px;
            }

            .form-group.button-group {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            button {
                padding: 12px 20px;
                font-size: 14px;
            }

            .logo-icon {
                width: 44px;
                height: 44px;
                font-size: 24px;
            }

            .progress-indicator {
                margin-bottom: 24px;
            }

            .progress-step {
                width: 36px;
                height: 36px;
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .login-header h1 {
                font-size: 22px;
            }

            .login-card {
                padding: 24px 16px;
            }

            .progress-indicator {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Main Login Container -->
    <div class="login-container">
        <!-- Header with Logo and Title -->
        <div class="login-header">
            <div class="logo-container">
                <div class="logo-icon">🚑</div>
                <h1>RapidReach</h1>
            </div>
            <p>Ambulance Priority System</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Status Message Container -->
            <div id="statusMessage" class="status-message"></div>

            <!-- Progress Indicator: Step 1 (Mobile) -> Step 2 (OTP) -> Step 3 (Success) -->
            <div class="progress-indicator">
                <div class="progress-line"></div>
                <div class="progress-step active" id="step1">1</div>
                <div class="progress-step" id="step2">2</div>
                <div class="progress-step" id="step3">3</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleFormSubmit(event)">
                <!-- Mobile Number Input Group -->
                <div class="form-group" id="mobileGroup">
                    <label for="mobileNumber" class="required">Mobile Number</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📱</span>
                        <input
                            type="tel"
                            id="mobileNumber"
                            placeholder="Enter your 10-digit mobile number"
                            maxlength="10"
                            inputmode="numeric"
                            autocomplete="tel"
                            aria-label="Mobile Number"
                        />
                    </div>
                    <div class="error-message" id="mobileError"></div>
                </div>

                <!-- OTP Input Group (Hidden until OTP is sent) -->
                <div class="form-group hidden" id="otpGroup">
                    <label for="otpInput" class="required">Enter OTP</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input
                            type="text"
                            id="otpInput"
                            placeholder="Enter 6-digit OTP"
                            maxlength="6"
                            inputmode="numeric"
                            autocomplete="off"
                            aria-label="OTP Code"
                        />
                    </div>
                    <div class="error-message" id="otpError"></div>
                    <!-- Timer for OTP resend -->
                    <div class="timer-text" id="timerText" style="display: none;">
                        Resend OTP in <span id="timerCount">60</span>s
                    </div>
                </div>

                <!-- Role Selection Dropdown -->
                <div class="form-group" id="roleGroup">
                    <label for="userRole" class="required">Select Role</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <select id="userRole" aria-label="Select User Role">
                            <option value="">-- Choose your role --</option>
                            <option value="driver">🚨 Ambulance Driver</option>
                            <option value="public">👥 Public User</option>
                        </select>
                    </div>
                    <div class="error-message" id="roleError"></div>
                </div>

                <!-- reCAPTCHA Container (required by Firebase Phone Auth) -->
                <div class="recaptcha-container" id="recaptchaContainer"></div>

                <!-- Send OTP Button (Step 1) -->
                <div class="form-group button-group" id="sendOtpButtonGroup">
                    <button type="button" class="btn-primary" id="sendOtpBtn" onclick="handleSendOTP()">
                        <span id="sendOtpText">Send OTP</span>
                    </button>
                </div>

                <!-- Verify OTP Button Group (Step 2) -->
                <div class="form-group button-group hidden" id="verifyOtpButtonGroup">
                    <button type="button" class="btn-secondary" id="changeMobileBtn" onclick="handleChangeMobile()">
                        Change Number
                    </button>
                    <button type="submit" class="btn-verify" id="verifyOtpBtn">
                        <span id="verifyOtpText">Verify OTP</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>

    <!-- JavaScript Logic -->
    <script>
        /* ===========================
           FIREBASE INITIALIZATION
           =========================== */

        /**
         * Firebase Configuration
         * IMPORTANT: Replace these placeholders with your actual Firebase project credentials
         * You can find these values in your Firebase Console:
         * 1. Go to Project Settings (gear icon)
         * 2. Click on your app or create a new web app
         * 3. Copy the configuration object
         * 
         * Steps to set up:
         * 1. Create a Firebase project at https://console.firebase.google.com
         * 2. Enable Phone Authentication in Firebase Console > Authentication > Sign-in method
         * 3. Enable reCAPTCHA v3 in Firebase Console > Authentication > Phone
         * 4. Replace the credentials below
         */
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", // Replace with your apiKey
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com", // Replace with your authDomain
            projectId: "YOUR_PROJECT_ID", // Replace with your projectId
            storageBucket: "YOUR_PROJECT_ID.appspot.com", // Replace with your storageBucket
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID", // Replace with your messagingSenderId
            appId: "YOUR_APP_ID" // Replace with your appId
        };

        // Initialize Firebase
        let firebase_initialized = false;
        try {
            firebase.initializeApp(firebaseConfig);
            firebase_initialized = true;
            console.log('Firebase initialized successfully');
        } catch (error) {
            console.error('Firebase initialization error:', error);
            console.warn('Please configure Firebase credentials in the HTML file');
        }

        // Get Firebase Auth instance
        const auth = firebase_initialized ? firebase.auth() : null;

        // Set Firebase Auth language to English
        if (auth) {
            auth.languageCode = 'en';
        }

        /* ===========================
           STATE MANAGEMENT
           =========================== */

        // Global application state
        const appState = {
            mobileNumber: '',           // Stores user's mobile number
            selectedRole: '',           // Stores selected role (driver or public)
            confirmationResult: null,   // Firebase confirmation result for OTP verification
            attemptCount: 0,            // Tracks failed OTP verification attempts
            maxAttempts: 3,             // Maximum allowed OTP verification attempts
            otpSent: false,             // Track if OTP has been sent
            reCaptchaVerifier: null,    // Firebase reCAPTCHA verifier
            timerInterval: null,        // OTP resend timer
            timerSeconds: 60            // Initial timer value in seconds
        };

        /* ===========================
           UTILITY FUNCTIONS
           =========================== */

        /**
         * Display status message with appropriate styling
         * @param {string} message - The message text to display
         * @param {string} type - Message type: 'success', 'error', or 'info'
         * @param {number} duration - Auto-hide duration in milliseconds (0 for no auto-hide)
         */
        function showStatusMessage(message, type = 'info', duration = 5000) {
            const statusElement = document.getElementById('statusMessage');
            if (!statusElement) return;
            
            statusElement.textContent = message;
            statusElement.className = `status-message ${type} show`;

            if (duration) {
                setTimeout(() => {
                    statusElement.classList.remove('show');
                }, duration);
            }
        }

        /**
         * Hide the status message
         */
        function hideStatusMessage() {
            const statusElement = document.getElementById('statusMessage');
            if (statusElement) {
                statusElement.classList.remove('show');
            }
        }

        /**
         * Display error message for a specific form field
         * @param {string} fieldId - The field identifier (without 'Error' suffix)
         * @param {string} message - The error message to display
         */
        function showFieldError(fieldId, message) {
            const errorElement = document.getElementById(`${fieldId}Error`);
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }
        }

        /**
         * Clear error message for a specific form field
         * @param {string} fieldId - The field identifier (without 'Error' suffix)
         */
        function clearFieldError(fieldId) {
            const errorElement = document.getElementById(`${fieldId}Error`);
            if (errorElement) {
                errorElement.textContent = '';
                errorElement.classList.remove('show');
            }
        }

        /**
         * Update the progress indicator based on current step
         * @param {number} currentStep - Current step number (1, 2, or 3)
         */
        function updateProgressIndicator(currentStep) {
            const steps = ['step1', 'step2', 'step3'];
            const progressLine = document.querySelector('.progress-line');

            // Update each step circle
            steps.forEach((stepId, index) => {
                const stepElement = document.getElementById(stepId);
                const stepNumber = index + 1;

                if (stepNumber < currentStep) {
                    // Previous steps are marked as completed
                    stepElement.className = 'progress-step completed';
                } else if (stepNumber === currentStep) {
                    // Current step is highlighted
                    stepElement.className = 'progress-step active';
                } else {
                    // Future steps are inactive
                    stepElement.className = 'progress-step';
                }
            });

            // Animate progress line fill
            if (currentStep > 1 && progressLine) {
                progressLine.classList.add('filled');
            } else if (progressLine) {
                progressLine.classList.remove('filled');
            }
        }

        /**
         * Validate Indian mobile number (must be exactly 10 digits, starting with 6-9)
         * @param {string} phoneNumber - The phone number to validate
         * @returns {boolean} True if valid, false otherwise
         */
        function validateIndianPhoneNumber(phoneNumber) {
            // Indian phone numbers: 10 digits, starting with 6-9
            const phoneRegex = /^[6-9][0-9]{9}$/;
            return phoneRegex.test(phoneNumber);
        }

        /**
         * Validate OTP format (must be exactly 6 digits)
         * @param {string} otp - The OTP to validate
         * @returns {boolean} True if valid, false otherwise
         */
        function validateOTP(otp) {
            const otpRegex = /^[0-9]{6}$/;
            return otpRegex.test(otp);
        }

        /**
         * Format phone number to international format with India country code
         * @param {string} phoneNumber - The phone number to format
         * @returns {string} Phone number in +91XXXXXXXXXX format
         */
        function formatPhoneNumber(phoneNumber) {
            return '+91' + phoneNumber;
        }

        /**
         * Sanitize user input by trimming whitespace
         * @param {string} input - The input to sanitize
         * @returns {string} Sanitized input
         */
        function sanitizeInput(input) {
            return input.trim();
        }

        /**
         * Set up the reCAPTCHA verifier for Firebase
         */
        function initializeRecaptcha() {
            try {
                if (!auth) {
                    showStatusMessage('Firebase not configured. Please add your Firebase credentials.', 'error', 0);
                    return false;
                }

                appState.reCaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptchaContainer', {
                    'size': 'normal',
                    'callback': (token) => {
                        console.log('reCAPTCHA verified with token');
                    },
                    'expired-callback': () => {
                        console.log('reCAPTCHA expired, please try again');
                        appState.reCaptchaVerifier = null;
                    }
                });
                
                return true;
            } catch (error) {
                console.error('reCAPTCHA initialization error:', error);
                showStatusMessage('Failed to initialize security verification. Please refresh and try again.', 'error', 0);
                return false;
            }
        }

        /**
         * Start timer for OTP resend countdown
         */
        function startOtpTimer() {
            appState.timerSeconds = 60;
            const timerElement = document.getElementById('timerText');
            const timerCount = document.getElementById('timerCount');
            const changeMobileBtn = document.getElementById('changeMobileBtn');

            if (!timerElement) return;
            
            timerElement.style.display = 'block';

            // Clear any existing timer
            if (appState.timerInterval) {
                clearInterval(appState.timerInterval);
            }

            // Update timer every second
            appState.timerInterval = setInterval(() => {
                appState.timerSeconds--;
                if (timerCount) timerCount.textContent = appState.timerSeconds;

                // When timer reaches 0, allow resending OTP
                if (appState.timerSeconds <= 0) {
                    clearInterval(appState.timerInterval);
                    timerElement.style.display = 'none';
                    if (changeMobileBtn) {
                        changeMobileBtn.textContent = 'Resend OTP';
                        changeMobileBtn.onclick = () => handleSendOTP();
                    }
                }
            }, 1000);
        }

        /**
         * Stop the OTP timer
         */
        function stopOtpTimer() {
            if (appState.timerInterval) {
                clearInterval(appState.timerInterval);
                appState.timerInterval = null;
            }
        }

        /**
         * Parse Firebase error messages and provide user-friendly feedback
         * @param {Error} error - Firebase error object
         * @returns {string} User-friendly error message
         */
        function getFirebaseErrorMessage(error) {
            const errorCode = error.code;
            const errorMessages = {
                'auth/invalid-phone-number': 'Invalid phone number. Please enter a valid 10-digit Indian mobile number starting with 6-9.',
                'auth/missing-phone-number': 'Please enter your phone number.',
                'auth/quota-exceeded': 'Too many SMS requests. Please try again in a few minutes.',
                'auth/user-disabled': 'This account has been disabled. Please contact support.',
                'auth/operation-not-allowed': 'Phone authentication is not enabled on this Firebase project.',
                'auth/invalid-verification-code': 'Invalid OTP. Please check the code and try again.',
                'auth/code-expired': 'The OTP has expired. Please request a new one.',
                'auth/session-expired': 'Your session has expired. Please try again.',
                'auth/invalid-credential': 'Invalid credentials. Please try again.',
                'auth/too-many-requests': 'Too many login attempts. Please try again later.',
                'auth/network-request-failed': 'Network error. Please check your internet connection and try again.'
            };
            
            return errorMessages[errorCode] || error.message || 'An error occurred. Please try again.';
        }

        /* ===========================
           FORM HANDLERS
           =========================== */

        /**
         * Handle the "Send OTP" button click
         * Sends OTP via Firebase Phone Authentication
         */
        async function handleSendOTP() {
            // Validate Firebase is configured
            if (!auth) {
                showStatusMessage('Firebase is not configured. Please add your Firebase credentials to the HTML file.', 'error', 0);
                return;
            }

            // Clear previous messages and errors
            hideStatusMessage();
            clearFieldError('mobile');
            clearFieldError('role');

            // Get and validate mobile number
            const mobileInput = document.getElementById('mobileNumber');
            const mobileNumber = sanitizeInput(mobileInput.value);

            if (!mobileNumber) {
                showFieldError('mobile', 'Please enter your mobile number');
                return;
            }

            if (!validateIndianPhoneNumber(mobileNumber)) {
                showFieldError('mobile', 'Please enter a valid 10-digit Indian mobile number (starting with 6-9)');
                return;
            }

            // Validate role selection
            const roleSelect = document.getElementById('userRole');
            const selectedRole = sanitizeInput(roleSelect.value);

            if (!selectedRole) {
                showFieldError('role', 'Please select your role');
                return;
            }

            // Update button state - show loading spinner
            const sendOtpBtn = document.getElementById('sendOtpBtn');
            const sendOtpText = document.getElementById('sendOtpText');
            sendOtpBtn.disabled = true;
            sendOtpText.innerHTML = '<div class="spinner"></div> Sending...';

            try {
                // Format phone number to international format
                const phoneNumber = formatPhoneNumber(mobileNumber);

                // Initialize reCAPTCHA if not already done
                if (!appState.reCaptchaVerifier) {
                    const initialized = initializeRecaptcha();
                    if (!initialized) {
                        throw new Error('Failed to initialize reCAPTCHA');
                    }
                }

                // Send OTP via Firebase Phone Authentication
                const confirmationResult = await auth.signInWithPhoneNumber(
                    phoneNumber,
                    appState.reCaptchaVerifier
                );

                // Store confirmation result for later OTP verification
                appState.confirmationResult = confirmationResult;
                appState.mobileNumber = mobileNumber;
                appState.selectedRole = selectedRole;
                appState.otpSent = true;
                appState.attemptCount = 0;

                // Show success message
                showStatusMessage(
                    `✓ OTP sent to ${mobileNumber}. Check your SMS.`,
                    'success',
                    4000
                );

                // Update UI: hide Send OTP button, show Verify OTP buttons
                document.getElementById('sendOtpButtonGroup').classList.add('hidden');
                document.getElementById('otpGroup').classList.add('show');
                document.getElementById('verifyOtpButtonGroup').classList.add('show');

                // Disable inputs to prevent modification
                mobileInput.disabled = true;
                roleSelect.disabled = true;

                // Update progress to step 2
                updateProgressIndicator(2);

                // Start OTP resend timer
                startOtpTimer();

                // Auto-focus on OTP input field
                setTimeout(() => {
                    const otpInput = document.getElementById('otpInput');
                    if (otpInput) otpInput.focus();
                }, 300);

            } catch (error) {
                console.error('Error sending OTP:', error);
                const errorMessage = getFirebaseErrorMessage(error);
                showStatusMessage(errorMessage, 'error', 0);
                
                // Reset reCAPTCHA on error
                if (appState.reCaptchaVerifier) {
                    appState.reCaptchaVerifier.clear();
                    appState.reCaptchaVerifier = null;
                }
            } finally {
                // Reset button state
                sendOtpBtn.disabled = false;
                sendOtpText.textContent = 'Send OTP';
            }
        }

        /**
         * Handle "Change Number" button click
         * Resets the form to initial state
         */
        function handleChangeMobile() {
            // Stop the timer
            stopOtpTimer();

            // Clear all input fields
            const mobileInput = document.getElementById('mobileNumber');
            const roleSelect = document.getElementById('userRole');
            const otpInput = document.getElementById('otpInput');

            if (mobileInput) mobileInput.value = '';
            if (mobileInput) mobileInput.disabled = false;
            if (roleSelect) roleSelect.selectedIndex = 0;
            if (roleSelect) roleSelect.disabled = false;
            if (otpInput) otpInput.value = '';

            // Reset UI visibility
            document.getElementById('sendOtpButtonGroup').classList.remove('hidden');
            document.getElementById('otpGroup').classList.remove('show');
            document.getElementById('verifyOtpButtonGroup').classList.remove('show');
            
            const timerText = document.getElementById('timerText');
            if (timerText) timerText.style.display = 'none';

            // Clear all messages and errors
            hideStatusMessage();
            clearFieldError('mobile');
            clearFieldError('role');
            clearFieldError('otp');

            // Reset application state
            appState.otpSent = false;
            appState.confirmationResult = null;
            appState.attemptCount = 0;

            // Sign out from Firebase to clear session
            if (auth) {
                auth.signOut().catch(error => console.error('Sign out error:', error));
            }

            // Update progress back to step 1
            updateProgressIndicator(1);

            // Auto-focus on mobile number input
            if (mobileInput) mobileInput.focus();

            // Reset button text
            const changeMobileBtn = document.getElementById('changeMobileBtn');
            if (changeMobileBtn) {
                changeMobileBtn.textContent = 'Change Number';
                changeMobileBtn.onclick = () => handleChangeMobile();
            }
        }

        /**
         * Handle form submission (OTP verification)
         * @param {Event} event - Form submit event
         */
        async function handleFormSubmit(event) {
            event.preventDefault();

            // Clear previous messages
            hideStatusMessage();
            clearFieldError('otp');

            // Check if OTP was sent
            if (!appState.otpSent || !appState.confirmationResult) {
                showStatusMessage('Please send OTP first', 'error');
                return;
            }

            // Get and validate entered OTP
            const otpInput = document.getElementById('otpInput');
            const enteredOTP = sanitizeInput(otpInput.value);

            if (!enteredOTP) {
                showFieldError('otp', 'Please enter the OTP');
                return;
            }

            if (!validateOTP(enteredOTP)) {
                showFieldError('otp', 'OTP must be exactly 6 digits');
                return;
            }

            // Update button state - show loading spinner
            const verifyOtpBtn = document.getElementById('verifyOtpBtn');
            const verifyOtpText = document.getElementById('verifyOtpText');
            verifyOtpBtn.disabled = true;
            verifyOtpText.innerHTML = '<div class="spinner"></div> Verifying...';

            try {
                // Verify OTP with Firebase
                const result = await appState.confirmationResult.confirm(enteredOTP);
                
                // OTP verification successful!
                appState.attemptCount = 0;
                stopOtpTimer();

                showStatusMessage(
                    '✓ OTP verified successfully! Redirecting...',
                    'success',
                    2000
                );

                // Update progress to step 3 (completed)
                updateProgressIndicator(3);

                // Redirect user after 2 seconds
                setTimeout(() => {
                    redirectUser();
                }, 2000);

            } catch (error) {
                console.error('Error verifying OTP:', error);
                appState.attemptCount++;

                // Check if max attempts exceeded
                if (appState.attemptCount >= appState.maxAttempts) {
                    showStatusMessage(
                        '❌ Maximum OTP verification attempts exceeded. Please request a new OTP.',
                        'error'
                    );
                    handleChangeMobile();
                    return;
                }

                // Show error with remaining attempts
                const remainingAttempts = appState.maxAttempts - appState.attemptCount;
                const errorMessage = getFirebaseErrorMessage(error);
                showFieldError(
                    'otp',
                    `${errorMessage} (${remainingAttempts} attempt${remainingAttempts !== 1 ? 's' : ''} remaining)`
                );
                otpInput.value = '';
                otpInput.focus();

            } finally {
                // Reset button state
                verifyOtpBtn.disabled = false;
                verifyOtpText.textContent = 'Verify OTP';
            }
        }

        /**
         * Redirect user to appropriate dashboard based on selected role
         */
        function redirectUser() {
            const role = appState.selectedRole;

            // Map roles to their dashboard URLs
            const validRoles = {
                driver: 'driver-dashboard.html',
                public: 'public-dashboard.html'
            };

            const redirectUrl = validRoles[role];

            if (redirectUrl) {
                // Navigate to the appropriate dashboard
                window.location.href = redirectUrl;
            } else {
                // Safety check for invalid role
                showStatusMessage(
                    'Invalid role selected. Please try again.',
                    'error'
                );
                handleChangeMobile();
            }
        }

        /* ===========================
           INPUT EVENT LISTENERS
           =========================== */

        // Mobile number input: Allow only digits (0-9)
        document.getElementById('mobileNumber').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
            clearFieldError('mobile');
        });

        // OTP input: Allow only digits (0-9)
        document.getElementById('otpInput').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
            clearFieldError('otp');
        });

        // Role selection: Clear errors when changed
        document.getElementById('userRole').addEventListener('change', function(e) {
            clearFieldError('role');
        });

        // Mobile number input: Allow Enter key to send OTP
        document.getElementById('mobileNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !appState.otpSent) {
                handleSendOTP();
            }
        });

        // OTP input: Allow Enter key to verify OTP
        document.getElementById('otpInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && appState.otpSent) {
                handleFormSubmit(new Event('submit'));
            }
        });

        /* ===========================
           INITIALIZATION
           =========================== */

        // Set initial focus and initialize reCAPTCHA when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (!firebase_initialized) {
                showStatusMessage('⚠️ Firebase is not configured. Please add your Firebase credentials to the HTML file to enable phone authentication.', 'error', 0);
                document.getElementById('sendOtpBtn').disabled = true;
            }
            
            // Set focus to mobile number input
            const mobileInput = document.getElementById('mobileNumber');
            if (mobileInput) mobileInput.focus();

            console.log('RapidReach Firebase Login Page Initialized');
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            stopOtpTimer();
        });
    </script>
